spring:
  application:
    name: molecom-backend
  profiles:
    active: local

  # ✅ 기본(Primary) 데이터소스: MySQL
  datasource:
    url: jdbc:mysql://localhost:3306/dicom_app?useSSL=false&allowPublicKeyRetrieval=true&characterEncoding=utf8&serverTimezone=Asia/Seoul
    username: ${MYSQL_USERNAME:dev}
    password: ${MYSQL_PASSWORD:devpass}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate         # 로컬 환경에서는 update 가능
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
        jdbc.time_zone: Asia/Seoul
    show-sql: false

# ✅ 보조 데이터소스: Oracle
app:
  datasource:
    oracle:
      url: jdbc:oracle:thin:@//210.94.241.9:1521/xe
      username: ${ORACLE_USERNAME:C##sahmyook}
      password: ${ORACLE_PASSWORD:sahmyook1}
      driver-class-name: oracle.jdbc.OracleDriver
      hikari:
        maximum-pool-size: 10
        minimum-idle: 2
  jpa:
    oracle:
      ddl-auto: validate
      show-sql: false
      properties:
        hibernate.dialect: org.hibernate.dialect.OracleDialect

# ✅ JWT 설정 (최상위 레벨)
jwt:
  secret: ${JWT_SECRET:change-me-change-me-change-me-change}   # 32바이트 이상 필수
  expiration: 3600000   # (예시) 토큰 만료 시간: 1시간 (ms)
  security:
    cors:
      allowed-origins: "http://localhost:3000,https://your-frontend.example.com"

# ✅ 서버 설정
server:
  port: 8080

# ✅ 로깅 설정
logging:
  level:
    root: INFO
    org.hibernate.SQL: INFO
    org.hibernate.orm.jdbc.bind: INFO

# ✅ Swagger / Springdoc 설정
springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
